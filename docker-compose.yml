services:
  db:
    image: mysql:8.4
    container_name: testix-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-testix}
      MYSQL_USER: ${DB_USERNAME:-testix}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testix}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: testix-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Testix}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-testix}
      DB_USERNAME: ${DB_USERNAME:-testix}
      DB_PASSWORD: ${DB_PASSWORD:-testix}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_SCHEME: ${MAIL_SCHEME:-null}
      MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Testix}
    volumes:
      - ./docker/backend/entrypoint.sh:/usr/local/bin/backend-entrypoint:ro
      - backend-storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_LARAVEL_URL: ${NEXT_PUBLIC_LARAVEL_URL:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_API_V1_URL: ${NEXT_PUBLIC_API_V1_URL:-/api/v1}
    container_name: testix-frontend
    restart: unless-stopped
    depends_on:
      - backend

  webserver:
    image: nginx:1.27-alpine
    container_name: testix-webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql-data:
  backend-storage:
